services:
  db:
    image: postgres:15
    container_name: monitoring_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminadmin
      POSTGRES_DB: monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: monitoring_api
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:adminadmin@db:5432/monitoring
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: monitoring_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: